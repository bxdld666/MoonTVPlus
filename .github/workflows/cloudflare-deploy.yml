name: Deploy to Cloudflare

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 核心修复：在这里显式声明权限，强制覆盖系统默认设置
permissions:
  contents: write
  deployments: write
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update wrangler.toml with environment variables
        run: |
          append_var() {
            [ -n "$2" ] && echo "$1 = \"$2\"" >> wrangler.toml
          }
          # 严格按照作者要求的 Secrets 注入
          append_var "NEXT_PUBLIC_STORAGE_TYPE" "${{ secrets.NEXT_PUBLIC_STORAGE_TYPE }}"
          append_var "UPSTASH_URL" "${{ secrets.UPSTASH_URL }}"
          append_var "UPSTASH_TOKEN" "${{ secrets.UPSTASH_TOKEN }}"
          append_var "REDIS_URL" "${{ secrets.REDIS_URL }}"
          append_var "USERNAME" "${{ secrets.USERNAME }}"
          append_var "PASSWORD" "${{ secrets.PASSWORD }}"

      - name: Build for Cloudflare
        run: pnpm run build:cloudflare
        env:
          # 解决编译时变量丢失问题
          UPSTASH_URL: ${{ secrets.UPSTASH_URL }}
          UPSTASH_TOKEN: ${{ secrets.UPSTASH_TOKEN }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          NEXT_PUBLIC_STORAGE_TYPE: ${{ secrets.NEXT_PUBLIC_STORAGE_TYPE }}
          NODE_ENV: production
          CI: true

      - name: Install Wrangler
        run: pnpm add -g wrangler@4.60.0

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          packageManager: pnpm
          wranglerVersion: "4.60.0"
