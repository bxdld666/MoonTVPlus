name: Deploy to Cloudflare

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update wrangler.toml
        run: |
          # 注入必需配置
          echo "NEXT_PUBLIC_STORAGE_TYPE = \"${{ secrets.NEXT_PUBLIC_STORAGE_TYPE }}\"" >> wrangler.toml
          echo "UPSTASH_URL = \"${{ secrets.UPSTASH_URL }}\"" >> wrangler.toml
          echo "UPSTASH_TOKEN = \"${{ secrets.UPSTASH_TOKEN }}\"" >> wrangler.toml
          echo "USERNAME = \"${{ secrets.USERNAME }}\"" >> wrangler.toml
          echo "PASSWORD = \"${{ secrets.PASSWORD }}\"" >> wrangler.toml

      - name: Build for Cloudflare
        run: pnpm run build:cloudflare
        env:
          UPSTASH_URL: ${{ secrets.UPSTASH_URL }}
          UPSTASH_TOKEN: ${{ secrets.UPSTASH_TOKEN }}
          NEXT_PUBLIC_STORAGE_TYPE: ${{ secrets.NEXT_PUBLIC_STORAGE_TYPE }}
          NODE_ENV: production

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          packageManager: pnpm
